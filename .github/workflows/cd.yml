name: CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Sync env vars to Vercel
        run: |
          PROJECT_ID=$(cat .vercel/project.json | python3 -c "import sys,json; print(json.load(sys.stdin)['projectId'])")
          echo "Project ID: $PROJECT_ID"

          sync_env() {
            KEY=$1
            VALUE=$2
            # 기존 env var ID 조회
            ENV_ID=$(curl -sf "https://api.vercel.com/v9/projects/$PROJECT_ID/env?decrypt=false" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" | \
              python3 -c "import sys,json; envs=json.load(sys.stdin).get('envs',[]); match=[e['id'] for e in envs if e['key']=='$KEY' and 'production' in e.get('target',[])]; print(match[0] if match else '')")

            if [ -n "$ENV_ID" ]; then
              echo "Updating $KEY (id: $ENV_ID)"
              curl -sf -X PATCH "https://api.vercel.com/v9/projects/$PROJECT_ID/env/$ENV_ID" \
                -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "{\"value\": \"$VALUE\", \"type\": \"plain\", \"target\": [\"production\"]}"
            else
              echo "Creating $KEY"
              curl -sf -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
                -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "{\"key\": \"$KEY\", \"value\": \"$VALUE\", \"type\": \"plain\", \"target\": [\"production\"]}"
            fi
            echo "$KEY synced"
          }

          sync_env "KAKAO_CLIENT_ID" "${{ secrets.KAKAO_CLIENT_ID }}"
          sync_env "KAKAO_CLIENT_SECRET" "${{ secrets.KAKAO_CLIENT_SECRET }}"
          sync_env "KAKAO_REDIRECT_URI" "${{ secrets.KAKAO_REDIRECT_URI }}"
          sync_env "PUBLIC_DATA_API_KEY" "${{ secrets.PUBLIC_DATA_API_KEY }}"

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
