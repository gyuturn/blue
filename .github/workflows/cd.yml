name: CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Sync env vars to Vercel
        run: |
          printf '%s' "${{ secrets.KAKAO_CLIENT_ID }}" | vercel env add KAKAO_CLIENT_ID production --token=${{ secrets.VERCEL_TOKEN }} --force 2>/dev/null || \
          (vercel env rm KAKAO_CLIENT_ID production --yes --token=${{ secrets.VERCEL_TOKEN }} && printf '%s' "${{ secrets.KAKAO_CLIENT_ID }}" | vercel env add KAKAO_CLIENT_ID production --token=${{ secrets.VERCEL_TOKEN }})

          printf '%s' "${{ secrets.KAKAO_CLIENT_SECRET }}" | vercel env add KAKAO_CLIENT_SECRET production --token=${{ secrets.VERCEL_TOKEN }} --force 2>/dev/null || \
          (vercel env rm KAKAO_CLIENT_SECRET production --yes --token=${{ secrets.VERCEL_TOKEN }} && printf '%s' "${{ secrets.KAKAO_CLIENT_SECRET }}" | vercel env add KAKAO_CLIENT_SECRET production --token=${{ secrets.VERCEL_TOKEN }})

          printf '%s' "${{ secrets.KAKAO_REDIRECT_URI }}" | vercel env add KAKAO_REDIRECT_URI production --token=${{ secrets.VERCEL_TOKEN }} --force 2>/dev/null || \
          (vercel env rm KAKAO_REDIRECT_URI production --yes --token=${{ secrets.VERCEL_TOKEN }} && printf '%s' "${{ secrets.KAKAO_REDIRECT_URI }}" | vercel env add KAKAO_REDIRECT_URI production --token=${{ secrets.VERCEL_TOKEN }})

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
